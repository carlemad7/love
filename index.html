<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I LOVE YOU</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#FEFAE0,#FAEDCD);
overflow:hidden;
color:#3a3a3a;
}

.container{
background:#ffffff;
padding:40px;
border-radius:20px;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
text-align:center;
max-width:520px;
}

h1{
margin-bottom:15px;
}

button{
padding:12px 25px;
border:none;
margin:10px;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:#FFB4A2;
color:white;
transition:0.25s;
}

button:hover{
background:#E5989B;
}

#loveMeter{
width:100%;
}

.emoji{
position:absolute;
font-size:28px;
opacity:0.8;
animation:float 15s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

.heart{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
}

</style>
</head>

<body>

<!-- Music -->
<iframe 
width="0"
height="0"
scrolling="no"
frameborder="no"
allow="autoplay"
src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/copilotbassem/omar-khairat-the-case-of-am&auto_play=true">
</iframe>

<div class="container" id="main">

<h1>Heyy Koukii ❤️</h1>
<h2>Do you like me?</h2>

<button onclick="yes1()">Yes</button>
<button id="noBtn">No</button>

</div>

<script>

const emojis=["🍣","🏎️","❤️","🍪"]

function createFloatingEmojis(){

for(let i=0;i<25;i++){

let e=document.createElement("div")
e.className="emoji"
e.innerText=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"%"
e.style.animationDuration=10+Math.random()*10+"s"

document.body.appendChild(e)

}

}

createFloatingEmojis()

const noBtn=document.getElementById("noBtn")

noBtn.addEventListener("mouseover",()=>{

alert("Like you? haha I love you ❤️")

noBtn.style.position="absolute"
noBtn.style.left=Math.random()*80+"%"
noBtn.style.top=Math.random()*80+"%"

})

function yes1(){

document.getElementById("main").innerHTML=`

<h1>How much do you love me?</h1>

<input type="range" min="0" max="5000" value="100" id="loveMeter">

<p id="percent">100%</p>

<button onclick="next()">Next ❤️</button>

`

let slider=document.getElementById("loveMeter")
let percent=document.getElementById("percent")

slider.oninput=()=>{

percent.innerText=slider.value+"%"

}

}

function next(){

document.getElementById("main").innerHTML=`

<h1>You are mine and mine alone and you will never ever ever be shared</h1>

<button onclick="agree()">Agree</button>

<button id="runBtn">Disagree</button>

`

let runBtn=document.getElementById("runBtn")

runBtn.addEventListener("mouseover",()=>{

runBtn.style.position="absolute"
runBtn.style.left=Math.random()*80+"%"
runBtn.style.top=Math.random()*80+"%"

})

}

function agree(){

document.getElementById("main").innerHTML=`

<h1>You are crazyyyyyy ❤️</h1>

<p>
Hey kouki i know what we’re going through isn’t easy and that this is a rough time but i wanted to tell you how proud i am of youu. You are actually the strongest person i ever met. And you are able to go through shit that no one would ever be able to handle. You are so strong and your faith is even stronger, and i am so proud of you. And i want you to know that i am here for youu through everything and that i will never ever leave your side. I may not be able to do much but i try my best for you. I dont want you to feel that youre going through something alone 5als. Aw that you are not understood or listened to. Because as i am alive you will always have someone that is there for you, listens to you, understands, by3ksk. You are getting the full package. On a serious note, everytime i say i love you more, i dont mean i love you more than you love me, i mean i love you more than the bad days ahead of us, i love you more than any fight we ever have, i love you more than any rough time we’re going through, i love you more than any amount of distance keeping us apart, i love you more than any obstacle that comes between us, and i love you more than the odds that are stacked against me. I love you more than anything. 
</p>

`

celebrate()

}

function celebrate(){

for(let i=0;i<40;i++){

let heart=document.createElement("div")

heart.className="heart"
heart.innerText="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(heart)

}

}

</script>

</body>
</html>
